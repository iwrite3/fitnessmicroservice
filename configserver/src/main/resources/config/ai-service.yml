server:
  port: 8083
spring:
  data:
    mongodb:
      # Inject cloud Mongo URL, fallback to local
      uri: ${MONGO_URI:mongodb://localhost:27017/fitnessrecommendation}
  rabbitmq:
    addresses: ${RABBITMQ_URL}
    
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

gemini:
  api:
    url: ${GEMINI_API_URL}
    key: ${GEMINI_API_KEY}

