server:
  port: 8080

eureka:
  client:
    service-url:
      # Inject cloud Eureka URL, fallback to local
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com
          issuer-uri: https://securetoken.google.com/fitnessmicroservice-f8902
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins: 
              - "https://fitness-frontend-one-eta.vercel.app"
              - "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: lb://user-service    
          predicates:
            - Path=/api/users/**

        - id: activity-service
          uri: lb://activity-service         
          predicates:
            - Path=/api/activities/**

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/recommendations/**
