spring:
  data:
    mongodb:
      
      uri: ${MONGODB_URI:mongodb://localhost:27017/fitnessactivity}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}


server:
  port: ${PORT:8082}


eureka:
  client:
    serviceUrl:
      # Use the Render URL you just got!
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}


rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

